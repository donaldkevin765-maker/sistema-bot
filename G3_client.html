<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QUANTUM GRID</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #050510; color: #e0e0ff; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
#game-container { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; align-items: center; }
#canvas-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; width: 100%; overflow: hidden; }
#canvas-container { position: relative; }
#gameCanvas { display: block; border-radius: 6px; }
#ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
#hud { display: flex; justify-content: center; align-items: center; gap: 20px; font-size: 16px; font-weight: 700; padding: 6px 0; flex-shrink: 0; width: 100%; max-width: 940px; }
#hud .player-score { display: flex; align-items: center; gap: 4px; }
#hud .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
#lobby { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(5,5,16,0.92); pointer-events: auto; z-index: 10; border-radius: 6px; }
#lobby.hidden { display: none; }
#lobby h1 { font-size: 32px; margin-bottom: 4px; background: linear-gradient(90deg, #00ccff, #ffcc00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
#lobby p.sub { color: #888; font-size: 13px; margin-bottom: 24px; }
#lobby input { background: #12122a; border: 1px solid #2a2a5a; color: #e0e0ff; padding: 10px 16px; border-radius: 4px; font-size: 15px; width: 240px; margin-bottom: 10px; outline: none; }
#lobby input::placeholder { color: #555; }
#lobby input:focus { border-color: #6a6aff; }
#lobby button { background: linear-gradient(135deg, #4a4aff, #8844ff); border: none; color: #fff; padding: 10px 28px; border-radius: 4px; font-size: 15px; font-weight: 600; cursor: pointer; margin: 4px; pointer-events: auto; }
#lobby button:hover { transform: scale(1.03); box-shadow: 0 0 18px rgba(100,100,255,0.4); }
#lobby .status { color: #aaa; font-size: 13px; margin-top: 12px; }
#lobby .error { color: #ff4488; font-size: 13px; margin-top: 8px; }
#game-over { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(5,5,16,0.85); z-index: 10; pointer-events: auto; border-radius: 6px; }
#game-over.hidden { display: none; }
#game-over h2 { font-size: 36px; margin-bottom: 6px; }
#game-over .sub { color: #aaa; font-size: 15px; margin-bottom: 18px; }
#game-over button { background: linear-gradient(135deg, #4a4aff, #8844ff); border: none; color: #fff; padding: 10px 28px; border-radius: 4px; font-size: 15px; font-weight: 600; cursor: pointer; margin: 4px; pointer-events: auto; }
#reconnect-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(5,5,16,0.9); z-index: 11; pointer-events: auto; border-radius: 6px; }
#reconnect-overlay.hidden { display: none; }
#reconnect-overlay h3 { font-size: 22px; margin-bottom: 6px; color: #ffcc44; }
#reconnect-overlay .countdown { font-size: 36px; font-weight: 700; color: #ffcc44; margin: 8px 0; }
#reconnect-overlay button { background: #3a3a6a; border: none; color: #fff; padding: 8px 20px; border-radius: 4px; font-size: 14px; cursor: pointer; margin-top: 8px; pointer-events: auto; }
#lobby-status { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); color: #888; font-size: 12px; z-index: 5; pointer-events: none; }
.kill-feed { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); z-index: 7; display: flex; flex-direction: column; align-items: center; gap: 2px; pointer-events: none; }
</style>
</head>
<body>
<div id="game-container">
  <div id="hud"></div>
  <div id="canvas-wrapper">
    <div id="canvas-container">
    <canvas id="gameCanvas" width="900" height="600"></canvas>
    <div id="ui-overlay">

    <div id="lobby">
      <h1>⬡ QUANTUM GRID</h1>
      <p class="sub">4-Player FFA · Capture territory · First to 50</p>
      <input id="inp-name" type="text" placeholder="Your name" maxlength="16">
      <input id="inp-room" type="text" placeholder="Room name" maxlength="20" value="room1">
      <button id="btn-join">JOIN GAME</button>
      <div class="status" id="lobby-msg">Enter a name and room</div>
      <div class="error" id="lobby-err"></div>
    </div>

    <div id="game-over" class="hidden">
      <h2 id="go-title">🏆 GAME OVER</h2>
      <div class="sub" id="go-sub">Winner!</div>
      <div class="sub" id="go-score" style="color:#888;font-size:13px;"></div>
      <button id="btn-rematch">PLAY AGAIN</button>
    </div>

    <div id="reconnect-overlay" class="hidden">
      <h3>⚠ CONNECTION LOST</h3>
      <p>Reconnecting...</p>
      <div class="countdown" id="reconnect-sec">30</div>
      <button id="btn-reconnect-cancel">NEW GAME</button>
    </div>

    <div id="lobby-status"></div>
  </div> <!-- end ui-overlay -->
  </div> <!-- end canvas-container -->
  </div> <!-- end canvas-wrapper -->
</div> <!-- end game-container -->

<script src="/g3/socket.io/socket.io.js"></script>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const lobby = document.getElementById('lobby');
const inpName = document.getElementById('inp-name');
const inpRoom = document.getElementById('inp-room');
const btnJoin = document.getElementById('btn-join');
const lobbyMsg = document.getElementById('lobby-msg');
const lobbyErr = document.getElementById('lobby-err');
const gameOver = document.getElementById('game-over');
const goTitle = document.getElementById('go-title');
const goSub = document.getElementById('go-sub');
const goScore = document.getElementById('go-score');
const btnRematch = document.getElementById('btn-rematch');
const reconnectOverlay = document.getElementById('reconnect-overlay');
const reconnectSec = document.getElementById('reconnect-sec');
const lobbyStatus = document.getElementById('lobby-status');
const hudEl = document.getElementById('hud');

const ARENA_W = 900;
const ARENA_H = 600;
const COLS = 10;
const ROWS = 7;
const CELL_W = ARENA_W / COLS;
const CELL_H = ARENA_H / ROWS;

const PLAYER_COLORS = ['#00ccff', '#ff66cc', '#ffcc00', '#44ff88'];

const G = {
  socket: null,
  localId: null,
  connected: false,
  gameState: 'waiting',
  playerIndex: -1,

  // Server state
  cells: [],
  scores: [],
  particles: [],

  // Lerp state
  lerpPlayers: new Map(),

  // Local
  keys: { up: false, down: false, left: false, right: false },
  myRoom: '',
  reconnecting: false,
  reconnectTimer: 0,
  wasDisconnected: false,
  prevScores: [],
  lastOwnedCount: 0,
};

// ─── Engagement ────────────────────────────────────────────
const SFX = {
  _ctx: null,
  _init() { try { this._ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} },
  _ensure() { if (!this._ctx) this._init(); if (this._ctx && this._ctx.state === 'suspended') this._ctx.resume(); },
  capture() {
    this._ensure(); if (!this._ctx) return;
    [400, 600, 800].forEach((f, i) => {
      const o = this._ctx.createOscillator(), g = this._ctx.createGain();
      o.type = 'sine'; o.frequency.setValueAtTime(f, this._ctx.currentTime + i * 0.06);
      g.gain.setValueAtTime(0.05, this._ctx.currentTime + i * 0.06);
      g.gain.exponentialRampToValueAtTime(0.001, this._ctx.currentTime + i * 0.06 + 0.12);
      o.connect(g); g.connect(this._ctx.destination); o.start(this._ctx.currentTime + i * 0.06);
      o.stop(this._ctx.currentTime + i * 0.06 + 0.12);
    });
  },
  lost() {
    this._ensure(); if (!this._ctx) return;
    const o = this._ctx.createOscillator(), g = this._ctx.createGain();
    o.type = 'sawtooth'; o.frequency.setValueAtTime(180, this._ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(80, this._ctx.currentTime + 0.25);
    g.gain.setValueAtTime(0.05, this._ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, this._ctx.currentTime + 0.25);
    o.connect(g); g.connect(this._ctx.destination); o.start(); o.stop(this._ctx.currentTime + 0.25);
  },
  score() {
    this._ensure(); if (!this._ctx) return;
    const o = this._ctx.createOscillator(), g = this._ctx.createGain();
    o.type = 'triangle'; o.frequency.setValueAtTime(300, this._ctx.currentTime);
    o.frequency.setValueAtTime(450, this._ctx.currentTime + 0.1);
    g.gain.setValueAtTime(0.04, this._ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, this._ctx.currentTime + 0.15);
    o.connect(g); g.connect(this._ctx.destination); o.start(); o.stop(this._ctx.currentTime + 0.15);
  },
  victory() {
    this._ensure(); if (!this._ctx) return;
    [300, 400, 500, 700, 900].forEach((f, i) => {
      const o = this._ctx.createOscillator(), g = this._ctx.createGain();
      o.type = 'sine'; o.frequency.setValueAtTime(f, this._ctx.currentTime + i * 0.12);
      g.gain.setValueAtTime(0.05, this._ctx.currentTime + i * 0.12);
      g.gain.exponentialRampToValueAtTime(0.001, this._ctx.currentTime + i * 0.12 + 0.18);
      o.connect(g); g.connect(this._ctx.destination); o.start(this._ctx.currentTime + i * 0.12);
      o.stop(this._ctx.currentTime + i * 0.12 + 0.18);
    });
  },
};
let shakeAmount = 0;
function triggerShake(v) { shakeAmount = Math.max(shakeAmount, Math.min(v, 20)); }

const kfEl = document.createElement('div');
kfEl.className = 'kill-feed';
document.getElementById('canvas-container').appendChild(kfEl);
function pushFeed(text, color) {
  const e = document.createElement('div');
  e.style.cssText = `font-size:11px;padding:3px 14px;border-radius:3px;background:${color || 'rgba(170,68,255,.12)'};color:#cc88ff;animation:kfAnim3 2.2s ease-out forwards;white-space:nowrap;font-weight:600`;
  e.textContent = text;
  kfEl.appendChild(e);
  setTimeout(() => e.remove(), 2400);
}
const kfStyle = document.createElement('style');
kfStyle.textContent = '@keyframes kfAnim3{0%{opacity:0;transform:translateY(4px)}8%{opacity:1;transform:translateY(0)}70%{opacity:1}100%{opacity:0;transform:translateY(-10px)}}';
document.head.appendChild(kfStyle);

// ─── Socket ─────────────────────────────────────────────────
function connect() {
  if (G.socket && G.socket.connected) return;
  G.socket = io('/', { path: '/g3/socket.io', transports: ['websocket', 'polling'], reconnection: false });

  G.socket.on('connect', () => {
    if (G.reconnecting) {
      const saved = localStorage.getItem('G3_player');
      if (saved) { try { const d = JSON.parse(saved); G.socket.emit('reconnect-game', { playerId: d.pid, roomName: d.room }); } catch(e) {} }
    }
  });

  G.socket.on('connected', (data) => {
    G.localId = data.playerId;
    G.connected = true;
    G.gameState = data.gameState;
    G.playerIndex = data.playerIndex;
    G.reconnecting = false;
    G.wasDisconnected = false;
    if (G.myRoom) localStorage.setItem('G3_player', JSON.stringify({ pid: G.localId, room: G.myRoom }));
    reconnectOverlay.classList.add('hidden');
    if (data.reconnected) pushFeed('🔄 RECONNECTED', 'rgba(68,255,136,.15)');
  });

  G.socket.on('game-state', (data) => {
    if (!data) return;
    G.gameState = data.gameState;
    G.cells = data.cells || [];
    G.particles = data.particles || [];

    // Time-based lerp for players
    const p3now = performance.now();
    if (data.players) {
      for (const p of data.players) {
        const tx = p.col * CELL_W + CELL_W / 2;
        const ty = p.row * CELL_H + CELL_H / 2;
        if (!G.lerpPlayers.has(p.id)) {
          G.lerpPlayers.set(p.id, { renderX: tx, renderY: ty, prevX: tx, prevY: ty, targetX: tx, targetY: ty, color: p.color, username: p.username, disconnected: p.disconnected, lerpStart: p3now });
        } else {
          const lp = G.lerpPlayers.get(p.id);
          lp.prevX = lp.renderX;
          lp.prevY = lp.renderY;
          lp.targetX = tx;
          lp.targetY = ty;
          lp.color = p.color;
          lp.username = p.username;
          lp.disconnected = p.disconnected;
          lp.lerpStart = p3now;
        }
      }
      // Remove stale
      for (const [id] of G.lerpPlayers) {
        if (!data.players.find(p => p.id === id)) G.lerpPlayers.delete(id);
      }
    }

    if (data.scores) {
      // Detect score change
      for (let i = 0; i < data.scores.length; i++) {
        if (G.prevScores[i] !== undefined && data.scores[i] !== G.prevScores[i]) {
          if (i === G.playerIndex) {
            SFX.capture(); triggerShake(4);
            pushFeed('⬡ TERRITORY EXPANDED', 'rgba(0,204,255,.15)');
          } else {
            SFX.score();
          }
        }
      }
      G.prevScores = [...data.scores];
    }

    // Update HUD
    updateHUD(data.scores);
  });

  G.socket.on('reconnect-failed', (data) => {
    G.reconnecting = false;
    localStorage.removeItem('G3_player');
    showLobby();
    lobbyErr.textContent = data.message || 'Reconnect failed';
  });

  G.socket.on('game-over', (data) => {
    showGameOver(data);
    try { window.parent.postMessage({ type: 'G3_SCORE', winner: data.winner, winnerName: data.winnerName, scores: data.scores }, '*'); } catch(e) {}
  });

  G.socket.on('error', (data) => { lobbyErr.textContent = data.message || 'Error'; });

  G.socket.on('disconnect', () => {
    if (G.gameState === 'playing' || G.gameState === 'waiting') {
      G.wasDisconnected = true;
      G.reconnecting = true;
      G.reconnectTimer = 30;
      reconnectOverlay.classList.remove('hidden');
      reconnectSec.textContent = '30';
    }
  });
}

// ─── HUD ───────────────────────────────────────────────────
function updateHUD(scores) {
  if (!scores) return;
  let html = '';
  for (let i = 0; i < scores.length; i++) {
    const active = i === G.playerIndex;
    html += `<span class="player-score" style="opacity:${active ? 1 : 0.6}">
      <span class="dot" style="background:${PLAYER_COLORS[i] || '#888'}"></span>
      <span style="color:${active ? '#fff' : '#888'}">${scores[i]}</span>
    </span>`;
  }
  hudEl.innerHTML = html;
}

// ─── Lobby ─────────────────────────────────────────────────
function showLobby() { lobby.classList.remove('hidden'); gameOver.classList.add('hidden'); reconnectOverlay.classList.add('hidden'); }
function hideLobby() { lobby.classList.add('hidden'); }

function joinGame() {
  const name = inpName.value.trim() || 'Player' + (Math.random() * 1000 | 0);
  const room = inpRoom.value.trim() || 'grid';
  G.myRoom = room;
  if (!G.socket || !G.socket.connected) { lobbyErr.textContent = 'Connecting...'; return; }
  lobbyErr.textContent = '';
  lobbyMsg.textContent = 'Joining...';
  G.socket.emit('join', { username: name, roomName: room });
}

function showGameOver(data) {
  gameOver.classList.remove('hidden');
  const won = data.winner === G.playerIndex;
  goTitle.textContent = won ? '🏆 VICTORY!' : '💔 DEFEAT';
  goSub.textContent = data.winnerName + ' wins!';
  goScore.textContent = 'Final scores: ' + (data.scores || []).join(' · ');
  SFX.victory();
  triggerShake(10);
}

// ─── Input ─────────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  const k = e.key.toLowerCase();
  if (k === 'w' || k === 'arrowup') { G.keys.up = true; e.preventDefault(); }
  if (k === 's' || k === 'arrowdown') { G.keys.down = true; e.preventDefault(); }
  if (k === 'a' || k === 'arrowleft') { G.keys.left = true; e.preventDefault(); }
  if (k === 'd' || k === 'arrowright') { G.keys.right = true; e.preventDefault(); }
  if (k === ' ' && G.gameState === 'ended') { btnRematch.click(); e.preventDefault(); }
});
document.addEventListener('keyup', (e) => {
  const k = e.key.toLowerCase();
  if (k === 'w' || k === 'arrowup') { G.keys.up = false; e.preventDefault(); }
  if (k === 's' || k === 'arrowdown') { G.keys.down = false; e.preventDefault(); }
  if (k === 'a' || k === 'arrowleft') { G.keys.left = false; e.preventDefault(); }
  if (k === 'd' || k === 'arrowright') { G.keys.right = false; e.preventDefault(); }
});

// Send input (15Hz)
setInterval(() => {
  if (G.socket && G.socket.connected && G.connected && G.gameState === 'playing') {
    G.socket.emit('input', { up: G.keys.up, down: G.keys.down, left: G.keys.left, right: G.keys.right });
  }
}, 66);

// ─── Render ─────────────────────────────────────────────────
function render(now) {
  const w = canvas.width, h = canvas.height;

  ctx.setTransform(1, 0, 0, 1, 0, 0);
  if (shakeAmount > 0.5) {
    ctx.translate((Math.random() - 0.5) * shakeAmount * 2, (Math.random() - 0.5) * shakeAmount * 2);
    shakeAmount *= 0.88;
  } else shakeAmount = 0;

  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, w, h);

  // ── Grid ──
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const idx = r * COLS + c;
      const cell = G.cells[idx];
      if (!cell) continue;

      const x = c * CELL_W;
      const y = r * CELL_H;

      // Cell fill
      let fillColor = '#0a0a1a';
      let borderColor = 'rgba(255,255,255,0.06)';

      if (cell.owner >= 0 && cell.owner < PLAYER_COLORS.length) {
        const col = PLAYER_COLORS[cell.owner];
        fillColor = col + '18';
        borderColor = col + '40';
      }

      ctx.fillStyle = fillColor;
      ctx.fillRect(x, y, CELL_W, CELL_H);
      ctx.strokeStyle = borderColor;
      ctx.lineWidth = 1;
      ctx.strokeRect(x, y, CELL_W, CELL_H);

      // Capture progress bar
      if (cell.progress > 0 && cell.progress < 1) {
        const barH = 3;
        const barY = y + CELL_H - barH - 2;
        ctx.fillStyle = 'rgba(255,255,255,0.1)';
        ctx.fillRect(x + 4, barY, CELL_W - 8, barH);
        ctx.fillStyle = cell.owner >= 0 ? PLAYER_COLORS[cell.owner] : '#888';
        ctx.fillRect(x + 4, barY, (CELL_W - 8) * cell.progress, barH);
      }
    }
  }

  // ── Particles ──
  for (const pt of G.particles) {
    const alpha = pt.life || 0.5;
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, 3, 0, Math.PI * 2);
    ctx.fillStyle = (pt.color || '#fff').replace(')', `,${alpha})`).replace('rgb', 'rgba');
    if (!pt.color.startsWith('rgba')) {
      ctx.globalAlpha = alpha;
      ctx.fillStyle = pt.color || '#fff';
      ctx.fill();
      ctx.globalAlpha = 1;
    } else {
      ctx.fill();
    }
  }

  // ── Players (time-based lerp) ──
  for (const [id, lp] of G.lerpPlayers) {
    const pt = Math.min(1, (now - lp.lerpStart) / 40);
    lp.renderX = lp.prevX + (lp.targetX - lp.prevX) * pt;
    lp.renderY = lp.prevY + (lp.targetY - lp.prevY) * pt;
    const isMe = id === G.localId;
    const radius = isMe ? 16 : 13;

    // Glow
    ctx.shadowColor = lp.color || '#888';
    ctx.shadowBlur = isMe ? 24 : 12;

    // Body
    ctx.beginPath();
    ctx.arc(lp.renderX, lp.renderY, radius, 0, Math.PI * 2);
    ctx.fillStyle = (lp.color || '#888') + (lp.disconnected ? '44' : 'cc');
    ctx.fill();
    ctx.shadowBlur = 0;

    // Ring
    ctx.strokeStyle = lp.color || '#888';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Disconnected indicator
    if (lp.disconnected) {
      ctx.fillStyle = 'rgba(255,0,0,0.3)';
      ctx.fillRect(lp.renderX - 8, lp.renderY - 2, 16, 4);
    }

    // Username
    ctx.fillStyle = lp.color || '#888';
    ctx.font = (isMe ? 'bold ' : '') + '9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(lp.username || '?', lp.renderX, lp.renderY + radius + 13);
  }

  // ── Border ──
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  ctx.strokeRect(0, 0, w, h);
}

// ─── Responsive resize ─────────────────────────────────────
function resizeCanvas() {
  const wrapper = document.getElementById('canvas-wrapper');
  if (!wrapper) return;
  const maxW = wrapper.clientWidth;
  const maxH = wrapper.clientHeight;
  const scale = Math.min(maxW / ARENA_W, maxH / ARENA_H);
  const cw = Math.floor(ARENA_W * scale);
  const ch = Math.floor(ARENA_H * scale);
  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';
  const container = document.getElementById('canvas-container');
  if (container) {
    container.style.width = cw + 'px';
    container.style.height = ch + 'px';
  }
}

// ─── Game loop ──────────────────────────────────────────────
function gameLoop(now) { resizeCanvas(); render(now); setTimeout(gameLoop, 2); }

// ─── Reconnect ──────────────────────────────────────────────
setInterval(() => {
  if (G.reconnecting && G.reconnectTimer > 0) {
    G.reconnectTimer--;
    reconnectSec.textContent = '' + G.reconnectTimer;
    if (G.reconnectTimer <= 0) { G.reconnecting = false; localStorage.removeItem('G3_player'); showLobby(); lobbyErr.textContent = 'Reconnect expired'; }
  }
  if (G.reconnecting && G.reconnectTimer > 0 && G.reconnectTimer % 3 === 0) {
    if (!G.socket || !G.socket.connected) connect();
  }
}, 1000);

// ─── Buttons ───────────────────────────────────────────────
btnJoin.addEventListener('click', () => { hideLobby(); if (!G.socket || !G.socket.connected) connect(); setTimeout(joinGame, 200); });
btnRematch.addEventListener('click', () => { gameOver.classList.add('hidden'); showLobby(); lobbyMsg.textContent = 'Create or join a new game'; });
document.getElementById('btn-reconnect-cancel').addEventListener('click', () => { G.reconnecting = false; localStorage.removeItem('G3_player'); if (G.socket) { G.socket.disconnect(); G.socket = null; } showLobby(); lobbyErr.textContent = ''; });
inpName.addEventListener('keydown', (e) => { if (e.key === 'Enter') btnJoin.click(); });
inpRoom.addEventListener('keydown', (e) => { if (e.key === 'Enter') btnJoin.click(); });

// ─── Init ──────────────────────────────────────────────────
function init() {
  connect();
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  lobbyMsg.textContent = 'Connected · Enter name and room';
  setTimeout(gameLoop, 2);
  const saved = localStorage.getItem('G3_player');
  if (saved) { try { const d = JSON.parse(saved); inpRoom.value = d.room || ''; } catch(e) {} }
}
init();
</script>
</body>
