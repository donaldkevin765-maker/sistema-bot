<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#fff;font-family:'Segoe UI',Arial,sans-serif;overflow:hidden;width:100vw;height:100vh}
/* Animated background */
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at 30% 20%,rgba(68,136,255,0.08),transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(255,68,170,0.06),transparent 50%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(2px 2px at 20px 30px,#ffffff0d,transparent),radial-gradient(2px 2px at 40px 70px,#ffffff08,transparent),radial-gradient(2px 2px at 50px 160px,#ffffff0a,transparent),radial-gradient(2px 2px at 90px 40px,#ffffff06,transparent),radial-gradient(2px 2px at 130px 80px,#ffffff0c,transparent);background-size:200px 200px;background-repeat:repeat;pointer-events:none;z-index:0}

#header{position:absolute;top:0;left:0;right:0;height:48px;background:rgba(10,10,26,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;padding:0 16px;z-index:100}
#header h1{font-size:16px;font-weight:700;background:linear-gradient(135deg,#4488ff,#ff44aa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-right:20px;letter-spacing:0.5px}
#header .nav{display:flex;gap:4px;flex-wrap:wrap;flex:1}
#header .nav a{padding:4px 10px;border-radius:4px;font-size:11px;color:#666;cursor:pointer;text-decoration:none;transition:all 0.2s;border:1px solid transparent}
#header .nav a:hover{color:#fff;background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.1)}
#header .nav a.active{color:#fff;background:rgba(68,136,255,0.15);border:1px solid rgba(68,136,255,0.25)} 
#header .badge{font-size:10px;color:#666;margin-left:auto;padding:3px 8px;background:rgba(255,255,255,0.04);border-radius:10px}

#game-container{position:absolute;top:48px;left:0;right:0;bottom:0;background:#000;transition:opacity 0.3s}
#game-container canvas{display:block;width:100%;height:100%}

#menu{position:absolute;top:48px;left:0;right:0;bottom:0;overflow-y:auto;background:radial-gradient(ellipse at center,#0f0f2a,#0a0a1a);padding:30px 20px;z-index:1;opacity:1;transition:opacity 0.35s,transform 0.35s}
#menu.hidden{opacity:0;transform:scale(0.97);pointer-events:none}
#menu h2{font-size:26px;margin-bottom:4px;text-align:center;background:linear-gradient(135deg,#4488ff,#ff44aa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#menu .subtitle{color:#555;text-align:center;font-size:13px;margin-bottom:28px}

.game-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;max-width:1200px;margin:0 auto;perspective:800px}
/* Game card cover art — Poki-style */
.game-card{position:relative;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:10px;cursor:pointer;transition:all 0.25s cubic-bezier(0.2,0.9,0.3,1.1);overflow:hidden;min-height:150px;display:flex;flex-direction:column;justify-content:flex-end}
.game-card .cover{position:absolute;top:0;left:0;width:100%;height:100%;border-radius:10px;opacity:0.6;transition:opacity 0.4s,transform 0.4s;z-index:0}
.game-card:hover .cover{opacity:0.8;transform:scale(1.05)}
.game-card .overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(to top,rgba(10,10,26,0.95) 30%,rgba(10,10,26,0.4) 70%,rgba(10,10,26,0.2) 100%);border-radius:10px;z-index:1;pointer-events:none}
.game-card .content{position:relative;z-index:2;padding:18px}
.game-card .title{font-size:14px;font-weight:600;margin-bottom:4px;text-shadow:0 1px 4px rgba(0,0,0,0.5)}
.game-card .genre{font-size:10px;color:#4488ff;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.game-card .desc{font-size:11px;color:#999;line-height:1.5}
.game-card .dim{font-size:10px;color:#555;margin-top:8px}
.game-card .dim span{color:#777}
.game-card:hover{transform:translateY(-3px) scale(1.01);box-shadow:0 8px 30px rgba(68,136,255,0.15);border-color:rgba(68,136,255,0.3)}
.game-card:active{transform:scale(0.97)}
.game-card.d2 .genre{color:#4488ff}
.game-card.d3 .genre{color:#ff44aa}

#back-btn{position:absolute;top:54px;left:10px;z-index:50;padding:6px 14px;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#888;font-size:12px;cursor:pointer;display:none;transition:all 0.2s;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
#back-btn:hover{color:#fff;background:rgba(0,0,0,0.7);border-color:rgba(255,255,255,0.2);transform:translateX(-2px)}

/* Loading overlay */
#loading{position:absolute;top:48px;left:0;right:0;bottom:0;background:rgba(10,10,26,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity 0.3s}
#loading.active{opacity:1;pointer-events:auto}
#loading .spinner{width:32px;height:32px;border:2px solid rgba(255,255,255,0.1);border-top:2px solid #4488ff;border-radius:50%;animation:spin 0.8s linear infinite}
#loading .text{color:#666;font-size:13px;margin-top:14px;letter-spacing:0.5px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Game card animation on mount */
.game-card{animation:cardIn 0.35s ease-out both}
.game-card:nth-child(1){animation-delay:0.02s}
.game-card:nth-child(2){animation-delay:0.04s}
.game-card:nth-child(3){animation-delay:0.06s}
.game-card:nth-child(4){animation-delay:0.08s}
.game-card:nth-child(5){animation-delay:0.10s}
.game-card:nth-child(6){animation-delay:0.12s}
.game-card:nth-child(7){animation-delay:0.14s}
.game-card:nth-child(8){animation-delay:0.16s}
.game-card:nth-child(9){animation-delay:0.18s}
.game-card:nth-child(n+10){animation-delay:0.20s}
@keyframes cardIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* Responsive */
@media(max-width:600px){.game-grid{grid-template-columns:1fr;gap:10px}#menu{padding:20px 12px}.game-card{min-height:130px}.game-card .content{padding:14px}}

/* Scrollbar styling */
#menu::-webkit-scrollbar{width:4px}
#menu::-webkit-scrollbar-track{background:transparent}
#menu::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}
#menu::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.15)}
</style>

<script>
// Initialize
document.addEventListener('DOMContentLoaded',function(){
gameContainer=document.getElementById('game-container');
menuEl=document.getElementById('menu');
backBtn=document.getElementById('back-btn');
headerEl=document.getElementById('header');
buildNav();
showMenu();
});

function buildNav(){
var nav=document.getElementById('nav');
nav.innerHTML='<a onclick="showMenu()" class="active">Arcade</a>';
var genres={};
GAMES.forEach(function(g){if(!genres[g.genre])genres[g.genre]=0;genres[g.genre]++;});
Object.keys(genres).sort().forEach(function(genre){
nav.innerHTML+='<a onclick="filterGenre(\''+genre+'\')">'+genre.charAt(0).toUpperCase()+genre.slice(1)+' ('+genres[genre]+')</a>';
});
}

function filterGenre(genre){
var cards=document.querySelectorAll('.game-card');
for(var i=0;i<cards.length;i++){
if(cards[i].dataset.genre===genre||!genre)cards[i].style.display='';
else cards[i].style.display='none';
}
}

function showLoading(on){var l=document.getElementById('loading');if(on)l.classList.add('active');else l.classList.remove('active');}

function destroyCurrentGame(){
if(CURRENT_GAME){try{if(gameInstances.destroy)gameInstances.destroy();}catch(e){}
if(window.FreeArcadeEngine&&window.FreeArcadeEngine.stopLoop)window.FreeArcadeEngine.stopLoop();try{if(window.FreeArcade3D&&window.FreeArcade3D.destroy)window.FreeArcade3D.destroy();}catch(e){}}
CURRENT_GAME=null;gameInstances={};
}

function showMenu(noAnim){
destroyCurrentGame();
gameContainer.style.display='none';gameContainer.innerHTML='';
backBtn.style.display='none';showLoading(false);
menuEl.classList.remove('hidden');headerEl.style.display='';
if(!noAnim){menuEl.style.opacity='0';requestAnimationFrame(function(){menuEl.style.opacity='1';});}
}

function createCanvas(container){
container.innerHTML='';
var canvas=document.createElement('canvas');
canvas.width=container.clientWidth||1024;
canvas.height=container.clientHeight||768;
container.appendChild(canvas);
return canvas;
}

function findGame(game){
return window[game.ns]||window[game.name.replace(/ /g,'')];
}

function loadGameData(game){
var gameId=game.ns?game.ns.charAt(0).toLowerCase()+game.ns.slice(1).replace(/[A-Z]/g,function(c){return'-'+c.toLowerCase()}):'';
try{
var gameData=window.loadGameData?window.loadGameData(gameId):null;
if(gameData)window.__gameData=gameData;
else{window.__gameData={weapons:[],enemies:[],levels:[],quests:[],lore:[],skills:[],achievements:[],crafting:[],consumables:[]};console.log('['+game.name+'] No data loaded');}
}catch(e){console.warn('['+game.name+'] Data load error:',e);window.__gameData={weapons:[],enemies:[],levels:[],quests:[],lore:[],skills:[],achievements:[],crafting:[],consumables:[]};}
}

function run3DGame(game,gameObj,canvas){
if(!window.FreeArcade3D){gameContainer.innerHTML='<div style="color:red;padding:20px;">3D Engine not loaded.</div>';return;}
try{
var engine3d=window.FreeArcade3D;
engine3d.gameData=window.__gameData||{};
engine3d.init(canvas);
gameObj.init(engine3d);
gameInstances=gameObj;
function loop3D(){if(CURRENT_GAME!==game)return;
var input=engine3d.input||{};
gameObj.update(1/60,input);
gameObj.render3D();
requestAnimationFrame(loop3D);}
loop3D();
}catch(e){gameContainer.innerHTML='<div style="color:red;padding:20px;">3D Error: '+e.message+'</div>';}
}

function run2DGame(game,gameObj,canvas,ctx){
if(!window.FreeArcadeEngine){gameContainer.innerHTML='<div style="color:red;padding:20px;">2D Engine not loaded.</div>';return;}
try{
canvas.id='canvas';
var engine=window.FreeArcadeEngine;
engine.init('canvas');
engine.loadGame(gameObj);
gameInstances=gameObj;
}catch(e){gameContainer.innerHTML='<div style="color:red;padding:20px;">2D Error: '+e.message+'</div>';}
}

function launchGame(game){
showLoading(true);menuEl.classList.add('hidden');headerEl.style.display='none';
setTimeout(function(){
gameContainer.style.display='';backBtn.style.display='';
gameContainer.style.opacity='0';
var canvas=createCanvas(gameContainer);
CURRENT_GAME=game;
var ctx=canvas.getContext('2d');
var gameObj=findGame(game);
if(!gameObj){showLoading(false);gameContainer.innerHTML='<div style="color:red;padding:20px;">Error: Game "'+game.name+'" not found.</div>';return;}
loadGameData(game);
if(game.dim==='3D'){run3DGame(game,gameObj,canvas);
}else{run2DGame(game,gameObj,canvas,ctx);}
showLoading(false);requestAnimationFrame(function(){gameContainer.style.opacity='1';});
},300);}

function detectGames(){
GAMES=[];
for(var ns in KNOWN_NS){
var gameObj=window[ns];
if(gameObj&&typeof gameObj==='object'&&gameObj.name){
var info=KNOWN_NS[ns];
gameObj.ns=ns;
gameObj.dim=info[1];
gameObj.genre=info[2];
if(!gameObj.description)gameObj.description=info[3];
GAMES.push(gameObj);
}
}
}

// Wait for scripts, detect games, then render
setTimeout(function(){detectGames();renderMenu();},1000);

function renderMenu(){
var html='<h2>FreeArcade</h2><div class="subtitle">'+GAMES.length+' Games — 2D + 3D</div><div class="game-grid">';
GAMES.sort(function(a,b){if(a.dim!==b.dim)return a.dim<b.dim?-1:1;return a.name.localeCompare(b.name);});
for(var i=0;i<GAMES.length;i++){
var g=GAMES[i];
var dimClass=g.dim==='3D'?'d3':'d2';
var dimLabel=g.dim||'2D';
var cover=gameCover(g.ns);
html+='<div class="game-card '+dimClass+'" data-genre="'+g.genre+'" onclick="launchGame(GAMES['+i+'])">'+
'<div class="cover" style="background:'+cover+'"></div>'+
'<div class="overlay"></div>'+
'<div class="content">'+
'<div class="title">'+g.name+'</div>'+
'<div class="genre">'+g.genre+' · '+dimLabel+'</div>'+
'<div class="desc">'+(g.description||'')+'</div>'+
'</div></div>';
}
html+='</div>';menuEl.innerHTML=html;
}
